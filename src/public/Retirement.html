<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <meta charset="utf-8">
    <title>COSC 481 Project</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/retirement.css">
    <link rel="shortcut icon" href="#"> </head>
  <body>
    
    <header>
      <div style="height: 7vh; ">
        <a href = "index.html" >Wealth Management System</a>
      </div>
      <div id="user-info" style="position:absolute; top:10px; right:20px; color:white;"></div>
    </header>

    <div class="menu">
      <a href = "RealEstate.html" ><i class="bi bi-house"></i>Real Estate</a>
      <a  href = "Investment.html" ><i class="bi bi-bank"></i>Investment</a>
      <a  href = "Retirement.html" style="color:lightgreen;"><i class="bi bi-sunglasses"></i>Retirement</a>
      <a  href = "Accounts.html"  ><i class="bi bi-file-person"></i>Account</a>
      <a href="admin.html" id="adminTab"><i class="bi bi-tools"></i>Admin</a>
    </div>

    <p id="message"></p>

    <div class="content-filler">
        <h2 style="text-align: center">Retirement Accounts</h2>
        <h5 style="text-align: center">You must be signed in to get started.</h5>

        <div id="charts-wrapper">
            <div id="retirement-chart-container">
                <canvas id="retirementChart" width="350" height="150"></canvas>
            </div>

            <div id="plan-growth-container">
                <canvas id="planGrowthChart"></canvas>
            </div>
        </div>
    </div>
    <hr>

    <h3 style="text-align:center;">Retirement Plans</h3>
    
    <div id ="add-plan" style="text-align: center; margin-bottom: 10px;">
      <button type="button" class="btn btn-primary" id="add-plan-button">Add Plan</button>
    </div>

    <div id="plans-container" style="text-align:center;"></div>

    <div id="investment-modal" class="modal">
      <div class="modal-content">
        <span id="close-modal">&times;</span>
        <div id="modal-body"></div>
      </div>
    </div>

    <div id="retirement-table-container">
      <table id="retirement-table" style="color:black;">
        <thead>
          <tr>
            <th>Account</th>
            <th>Balance</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="retirement-table-body">
        </tbody>
      </table>
    </div>

    <div id="add-investments-button-container">
      <button type="button" class="btn btn-success">Add Investments</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/session.js"></script>
    <script src="./js/retirement.js"></script>
    <script src="./js/retirementPlans.js"></script>
  </body>
</html>
