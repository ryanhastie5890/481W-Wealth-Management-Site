<!DOCTYPE html>
<html lang="en" dir="ltr">
<!--webpage for retirement-->

<head>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <meta charset="utf-8">
  <title>COSC 481 Project</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/retirement.css">
  <link rel="shortcut icon" href="#"> <!--to remove 404 error favicon.ico not found -->
</head>

<body>
  <header>
    <!--header section of the website-->
    <div style="height: 7vh; ">
      <a href="index.html">Wealth Management System</a>
    </div>
    <!--display user while logged in & logout dropdown-->
    <div id="user-info" style="position:absolute; top:10px; right:20px; color:white;"></div>
  </header>
  <!--main menu-->
  <div class="menu">
    <a href="RealEstate.html"><i class="bi bi-house"></i>Real Estate</a>
    <a href="Investment.html"><i class="bi bi-bank"></i>Investment</a>
    <a href="Retirement.html" style="color:lightgreen;"><i class="bi bi-sunglasses"></i>Retirement</a>
    <a href="Accounts.html"><i class="bi bi-file-person"></i>Account</a>
    <a href="admin.html" id="adminTab" style="display:none;"><i class="bi bi-tools"></i>Admin</a>
  </div>
  <p id="message"></p>

  <h2 style="text-align: center">Retirement Accounts</h2>

  <!-- charts wrapper -->
  <div id="charts-wrapper">
    <!--chart.js doughnut chart-->
    <div id="retirement-chart-container">
      <canvas id="retirementChart" width="350" height="350"></canvas>
    </div>

    <!--chart.js line chart-->
    <div id="plan-growth-container">
      <canvas id="planGrowthChart"></canvas>
    </div>
  </div>

  <div class="slide-group">
    <button type="button" data-target="savings-section" style="border-radius: 5px;">Savings</button>
    <button type="button" data-target="investments-section" style="border-radius: 5px;">Investments</button>
    <!-- <button type="bnutton">Assets</button>
        <button type="button">Expenses</button> -->
    <button type="button" data-target="plans-section" style="border-radius: 5px;">Plans</button>
  </div>

  <div id="plans-section" class="content-section">
    <h3 style="text-align:center; margin-top: 10px">Retirement Plans</h3>
    <div id="plans-container" style="text-align:center;"></div>
    <div id="add-plan">
      <button id="add-plan-button" style="margin-top: 20px;">Add Plan</button>
    </div>
  </div>

  <!-- Investments section -->
  <div id="investments-section" class="content-section">
    <h3 style="text-align:center; margin-top: 10px">Retirement Investments</h3>
    <!--display user retirement accounts-->
    <div id="retirement-table-container">
      <table id="retirement-table" style="margin-top:20px; margin-bottom:20px;  color:black;">
        <thead>
          <tr>
            <th id="account-header">Account</th>
            <th id="balance-header">Balance</th>
            <th id="actions-header">Actions</th>
          </tr>
        </thead>
        <!--table for retirement accounts-->
        <tbody id="retirement-table-body">
        <!-- rows inserted here -->
        </tbody>
      </table>
      <div id="add-investments-button-container">
        <input type="button" id="add-investments-button" value="Add Investment Accounts">
      </div>
    </div>
  </div>

  <!-- Savings section -->
  <div id="savings-section" class="content-section">
    <h3 style="text-align:center; margin-top:10px; margin-bottom:20px;">Savings</h3>
    <!--display user savings accounts-->
    <div id="savings-table-container">
      <table id="savings-table" style="margin-top:20px; margin-bottom:20px; margin:auto; color:black;">
        <thead>
          <tr>
            <th id="savings-account-header">Account</th>
            <th id="savings-balance-header">Balance</th>
            <th id="savings-actions-header">Actions</th>
          </tr>
        </thead>
        <!--table for savings accounts-->
        <tbody id="savings-table-body"></tbody>
        <!-- rows inserted here -->
      </table>
    </div>
    <div style="text-align:center; margin-bottom:10px;">
      <button id="add-savings-button" style="margin-top: 20px; border-radius: 5px;">Add Savings Account</button>
    </div>
  </div>

  <!--modal container: display new investment options-->
  <div id="investment-modal" class="modal">
    <div class="modal-content">
      <span id="close-modal">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- display chart graphics-->
  <script src="./js/session.js"></script>                       <!-- server side handler-->
  <!-- client side js -->
  <script src="./js/retirementSavings.js"></script>
  <script src="./js/retirement.js"></script>
  <script src="./js/retirementPlans.js"></script>
  <script src="./js/retirementTabs.js"></script>
</body>

</html>
