<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

  <script>
  fetch('/api/session/getSession')
    .then(res => res.json())
    .then(data => {
      if (!data.loggedIn || data.role !== 'admin') {
        window.location.href = '/index.html';
      }
    });
</script>

  <header>
    <div class="heading" style="height: 7vh;">
      <a href="index.html">Wealth Management System</a>
    </div>
    <div id="user-info" style="position:absolute; top:10px; right:20px; color:white;"></div>
  </header>

  <div class="menu">
    <a href="RealEstate.html"><i class="bi bi-house"></i>Real Estate</a>
    <a href="Investment.html"><i class="bi bi-bank"></i>Investment</a>
    <a href="Retirement.html"><i class="bi bi-sunglasses"></i>Retirement</a>
    <a href="Accounts.html"><i class="bi bi-file-person"></i>Account</a>
    <a href="admin.html" id="adminTab" style="color: lightgreen; display:none"><i class="bi bi-tools"></i>Admin</a>
  </div>

  <h1 style="text-align:center; margin-top:20px;">Admin Dashboard</h1>
  <p style="text-align:center;">Remove user accounts below.</p>

  <div class="container mt-4">
    <table id="usersTable" class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Email</th>
          <th>Display Name</th>
          <th>Role</th>
          <th>Locked</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="./js/session.js"></script>

  <script>
    async function loadUsers() {
      const res = await fetch('/api/admin/users');
      const users = await res.json();

      const tbody = document.querySelector('#usersTable tbody');
      tbody.innerHTML = '';

      users.forEach(user => {
        const row = document.createElement('tr');

        row.innerHTML = `
          <td>${user.email}</td>
          <td>${user.display_name || "(none)"}</td>
          <td>${user.role}</td>
          <td>
            <input type="checkbox" 
              ${user.locked ? "checked" : ""} 
              onchange="toggleLock(${user.id}, this.checked)">
         </td>
         <td>
           <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">Delete</button>
         </td>
        `;


        tbody.appendChild(row);
      });
    }

    async function deleteUser(id) {
      await fetch(`/api/admin/users/${id}`, { method: 'DELETE' });
      loadUsers();
    }

    async function toggleLock(id, locked) {
  await fetch(`/api/admin/users/${id}/lock`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ locked })
  });

  loadUsers();
  }


fetch('/api/session/getSession')
  .then(res => res.json())
  .then(data => {
    if (!data.loggedIn || data.role !== 'admin') {
      window.location.href = '/index.html';
      return;
    }
    loadUsers();
  });
  </script>

</body>
</html>
